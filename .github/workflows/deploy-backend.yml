name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'

  workflow_dispatch:

# fix: OIDC 사용 시 필수 권한 선언
permissions:
  id-token: write   # OIDC 토큰 발급
  contents: read

jobs:
  test:
    name: Run Tests
    uses: ./.github/workflows/test.yml
    permissions:
      id-token: write
      contents: read

  deploy:
    name: Package & Deploy to Lambda
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Build Lambda package
        run: |
          cd backend
          pip install -r requirements.txt -t package/ --quiet
          cp -r app package/
          cd package
          zip -r ../lambda.zip . -q
          cd ..
          echo "📦 Package size: $(du -sh lambda.zip | cut -f1)"

      # fix: Access Key 방식 → OIDC role-to-assume 방식
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4.1.0
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-northeast-2

      - name: Check package size
        id: pkg_size
        run: |
          SIZE=$(stat -c%s backend/lambda.zip)
          echo "size=$SIZE" >> $GITHUB_OUTPUT
          echo "Package size: ${SIZE} bytes"

      - name: Upload via S3 (if > 50MB)
        if: ${{ steps.pkg_size.outputs.size > 52428800 }}
        run: |
          aws s3 cp backend/lambda.zip \
            s3://${{ secrets.S3_LAMBDA_BUCKET }}/devnavi-prod-api/lambda.zip
          aws lambda update-function-code \
            --function-name devnavi-prod-api \
            --s3-bucket ${{ secrets.S3_LAMBDA_BUCKET }} \
            --s3-key devnavi-prod-api/lambda.zip \
            --no-cli-pager

      - name: Upload directly (if <= 50MB)
        if: ${{ steps.pkg_size.outputs.size <= 52428800 }}
        run: |
          aws lambda update-function-code \
            --function-name devnavi-prod-api \
            --zip-file fileb://backend/lambda.zip \
            --no-cli-pager

      - name: Wait for update & verify
        run: |
          aws lambda wait function-updated \
            --function-name devnavi-prod-api
          aws lambda get-function-configuration \
            --function-name devnavi-prod-api \
            --query '{State: State, LastUpdateStatus: LastUpdateStatus, CodeSize: CodeSize}' \
            --output table \
            --no-cli-pager

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CF_API_DISTRIBUTION_ID }} \
            --paths "/*" \
            --no-cli-pager
        continue-on-error: true   # CF_API_DISTRIBUTION_ID 미설정 시 배포 차단 방지

      - name: Deploy summary
        run: |
          echo "✅ Backend deployed successfully"
          echo "🔗 API URL: https://api.devnavi.kr"
