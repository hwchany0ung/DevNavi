name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'

  workflow_dispatch:

# fix: OIDC 사용 시 필수 권한 선언
permissions:
  id-token: write   # OIDC 토큰 발급
  contents: read

jobs:
  test:
    name: Run Tests
    uses: ./.github/workflows/test.yml
    secrets: inherit   # SUPABASE_TEST_URL 등 secrets를 호출된 워크플로에 전달
    permissions:
      id-token: write
      contents: read

  deploy:
    name: Package & Deploy to Lambda
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Build Lambda package
        run: |
          cd backend
          pip install -r requirements.txt -t package/ --quiet
          cp -r app package/
          cd package
          zip -r ../lambda.zip . -q
          cd ..
          echo "📦 Package size: $(du -sh lambda.zip | cut -f1)"

      # fix: Access Key 방식 → OIDC role-to-assume 방식
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4.1.0
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-northeast-2

      - name: Check package size
        id: pkg_size
        run: |
          SIZE=$(stat -c%s backend/lambda.zip)
          echo "size=$SIZE" >> $GITHUB_OUTPUT
          echo "Package size: ${SIZE} bytes"

      - name: Upload via S3 (if > 50MB)
        if: ${{ steps.pkg_size.outputs.size > 52428800 }}
        run: |
          aws s3 cp backend/lambda.zip \
            s3://${{ secrets.S3_LAMBDA_BUCKET }}/devnavi-prod-api/lambda.zip
          aws lambda update-function-code \
            --function-name devnavi-prod-api \
            --s3-bucket ${{ secrets.S3_LAMBDA_BUCKET }} \
            --s3-key devnavi-prod-api/lambda.zip \
            --no-cli-pager

      - name: Upload directly (if <= 50MB)
        if: ${{ steps.pkg_size.outputs.size <= 52428800 }}
        run: |
          aws lambda update-function-code \
            --function-name devnavi-prod-api \
            --zip-file fileb://backend/lambda.zip \
            --no-cli-pager

      - name: Wait for update & verify
        run: |
          aws lambda wait function-updated \
            --function-name devnavi-prod-api
          aws lambda get-function-configuration \
            --function-name devnavi-prod-api \
            --query '{State: State, LastUpdateStatus: LastUpdateStatus, CodeSize: CodeSize}' \
            --output table \
            --no-cli-pager

      # M7: 배포 후 불변 버전 스냅샷 생성 — 롤백 시 이 버전 번호를 사용
      - name: Publish Lambda version (rollback snapshot)
        id: publish_version
        run: |
          VERSION=$(aws lambda publish-version \
            --function-name devnavi-prod-api \
            --description "deploy: ${{ github.sha }}" \
            --query 'Version' --output text --no-cli-pager)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "📌 Lambda version published: $VERSION"
          echo "💡 Rollback 명령어: aws lambda update-function-code --function-name devnavi-prod-api --function-version $VERSION"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CF_API_DISTRIBUTION_ID }} \
            --paths "/*" \
            --no-cli-pager
        continue-on-error: true   # CF_API_DISTRIBUTION_ID 미설정 시 배포 차단 방지

      # I13: Lambda 콜드 스타트 검증 — 잘못된 SSM 파라미터로 배포된 경우 즉시 감지
      - name: Cold start health check
        run: |
          echo "🔍 Lambda 콜드 스타트 검증 중 (최대 5회 재시도)..."
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 https://api.devnavi.kr/health)
            if [ "$STATUS" = "200" ]; then
              echo "✅ Health check passed (시도 $i)"
              exit 0
            fi
            echo "⏳ 시도 $i 실패 (HTTP $STATUS) — 10초 후 재시도..."
            sleep 10
          done
          echo "❌ Health check 5회 모두 실패"
          echo ""
          echo "⚠️  롤백 방법:"
          echo "  이전 Lambda 버전으로 수동 롤백하거나 이전 커밋으로 재배포하세요."
          echo "  발행된 버전 확인: aws lambda list-versions-by-function --function-name devnavi-prod-api"
          exit 1

      - name: Deploy summary
        run: |
          echo "✅ Backend deployed successfully"
          echo "🔗 API URL: https://api.devnavi.kr"
          echo "📌 Lambda version: ${{ steps.publish_version.outputs.version }}"
