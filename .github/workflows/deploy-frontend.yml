name: Deploy Frontend

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy-frontend.yml'

  workflow_dispatch:

# fix: OIDC 사용 시 필수 권한 선언
permissions:
  id-token: write   # OIDC 토큰 발급
  contents: read

jobs:
  deploy:
    name: Build & Deploy to S3 + CloudFront
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Build
        run: npm run build
        working-directory: frontend
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      # fix: Access Key 방식 → OIDC role-to-assume 방식
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-northeast-2

      # index.html: no-cache (항상 최신 버전 보장)
      - name: Upload index.html (no-cache)
        run: |
          aws s3 cp frontend/dist/index.html \
            s3://${{ secrets.S3_BUCKET }}/index.html \
            --cache-control "no-cache, no-store, must-revalidate" \
            --content-type "text/html; charset=utf-8"

      # assets (해시 포함): 1년 캐시
      - name: Upload assets (long-cache)
        run: |
          aws s3 sync frontend/dist \
            s3://${{ secrets.S3_BUCKET }} \
            --exclude "index.html" \
            --cache-control "public, max-age=31536000, immutable" \
            --delete

      # 배포 후 CloudFront 캐시 무효화 (index.html만)
      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CF_FRONTEND_DIST_ID }} \
            --paths "/index.html"

      - name: Deploy summary
        run: |
          echo "✅ Frontend deployed successfully"
          echo "🌐 URL: https://devnavi.kr"
