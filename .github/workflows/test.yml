name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

jobs:
  # ──────────────────────────────────────────────────────────────
  # Job 1: Backend Unit Tests (항상 실행)
  # ──────────────────────────────────────────────────────────────
  test-backend-unit:
    name: Backend Unit Tests (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Run unit tests with coverage
        # unit 테스트가 커버하는 모듈만 측정 (app/ml, app/core, app/models)
        # app/services, app/prompts는 integration 테스트에서 커버
        run: pytest tests/unit/ -v -m unit --cov=app/ml --cov=app/core --cov=app/models --cov-report=term-missing --cov-fail-under=80
        env:
          ENV: test
          ANTHROPIC_API_KEY: test-key
          SUPABASE_URL: https://test.supabase.co
          SUPABASE_SERVICE_KEY: test-key
          SUPABASE_JWT_SECRET: test-jwt-secret-32-chars-minimum!!
          CLOUDFRONT_SECRET: test-cf-secret

  # ──────────────────────────────────────────────────────────────
  # Job 2: Backend Integration Tests (SUPABASE_TEST_URL secret 있을 때만)
  # ──────────────────────────────────────────────────────────────
  test-backend-integration:
    name: Backend Integration Tests (real Supabase)
    runs-on: ubuntu-latest
    # if 조건 제거: secrets 비교는 workflow 레벨 오류 유발
    # SUPABASE_TEST_URL 미설정 시 pytest.skip()이 자동으로 처리
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Run integration tests
        # SUPABASE_TEST_URL 미설정 시 conftest.py가 pytest.skip() → exit 5 (no tests collected)
        # exit 5는 "테스트 없음"이므로 성공으로 처리
        run: pytest tests/integration/ -v -m integration || [ $? -eq 5 ]
        env:
          ENV: test
          ANTHROPIC_API_KEY: test-key
          SUPABASE_URL: ${{ secrets.SUPABASE_TEST_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_TEST_SERVICE_KEY }}
          SUPABASE_JWT_SECRET: ${{ secrets.SUPABASE_TEST_JWT_SECRET }}
          SUPABASE_TEST_URL: ${{ secrets.SUPABASE_TEST_URL }}
          SUPABASE_TEST_ANON_KEY: ${{ secrets.SUPABASE_TEST_ANON_KEY }}
          SUPABASE_TEST_SERVICE_KEY: ${{ secrets.SUPABASE_TEST_SERVICE_KEY }}
          CLOUDFRONT_SECRET: test-cf-secret

  # ──────────────────────────────────────────────────────────────
  # Job 3: Frontend Unit/Component Tests (항상 실행)
  # ──────────────────────────────────────────────────────────────
  test-frontend:
    name: Frontend Tests (vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-node@v4.4.0
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm test -- --coverage

  # ──────────────────────────────────────────────────────────────
  # Job 4: E2E Tests (main 브랜치 push 시에만)
  # ──────────────────────────────────────────────────────────────
  test-e2e:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-node@v4.4.0
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build app for E2E (preview 서버용)
        run: npm run build

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npx playwright test --config=playwright.config.ts
        env:
          E2E_BASE_URL: http://localhost:4173
          CI: true

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7
